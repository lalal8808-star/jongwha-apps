<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사다리타기</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-color: #000000;
            --accent-color: #007aff;
            --border-color: #c6c6c8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; }

        .setup-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label { font-weight: 600; min-width: 80px; }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.6; }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-reset { background-color: #ff3b30; color: white; margin-top: 10px; }

        #game-container {
            display: none;
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #fff;
        }

        .names-container, .results-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
        }

        .node-input {
            width: 60px;
            text-align: center;
            border: none;
            border-bottom: 2px solid var(--accent-color);
            font-size: 0.9rem;
            padding: 5px;
        }

        .results-container { margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🪜 사다리타기</h1>

    <div class0-container id="setup-ui" class="setup-container">
        <div class="input-row">
            <div class="input-group">
                <label>참가자 수</label>
                <input type="number" id="player-count" value="4" min="2" max="10">
            </div>
        </div>
        <button class="btn-primary" onclick="initGame()">사다리 생성</button>
    </div>

    <div id="game-container">
        <div id="names-top" class="names-container"></div>
        <canvas id="ladder-canvas"></canvas>
        <div id="names-bottom" class="results-container"></div>
        
        <button class="btn-primary" style="margin-top: 20px;" onclick="startLadder()">결과 보기</button>
        <button class="btn-reset" onclick="location.reload()">다시 하기</button>
    </div>

    <script>
        let count = 0;
        let width = 0;
        let height = 400;
        let nodes = []; // Horizontal bars
        let players = [];
        let results = [];

        const canvas = document.getElementById('ladder-canvas');
        const ctx = canvas.getContext('2d');

        function initGame() {
            count = parseInt(document.getElementById('player-count').value);
            if (count < 2 || count > 10) { alert("2~10명 사이로 입력해주세요."); return; }

            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            setupUI();
            drawLadder();
        }

        function setupUI() {
            const topDiv = document.getElementById('names-top');
            const bottomDiv = document.getElementById('names-bottom');
            topDiv.innerHTML = '';
            bottomDiv.innerHTML = '';

            width = Math.min(window.innerWidth - 60, 450);
            canvas.width = width;
            canvas.height = height;

            const spacing = width / (count + 1);

            for (let i = 0; i < count; i++) {
                // Top inputs (Names)
                const input = document.createElement('input');
                input.className = 'node-input';
                input.value = `P${i+1}`;
                input.style.width = `${spacing - 10}px`;
                topDiv.appendChild(input);

                // Bottom inputs (Results)
                const resInput = document.createElement('input');
                resInput.className = 'node-input';
                resInput.value = `R${i+1}`;
                resInput.style.width = `${spacing - 10}px`;
                bottomDiv.appendChild(resInput);
            }

            // Generate random horizontal bars
            nodes = [];
            for (let i = 0; i < count - 1; i++) {
                let barCount = Math.floor(Math.random() * 3) + 2; // 2~4 bars per level
                for (let j = 0; j < barCount; j++) {
                    nodes.push({
                        column: i, // connects column i and i+1
                        y: Math.random() * (height - 60) + 30
                    });
                }
            }
            // Sort nodes by y to draw correctly
            nodes.sort((a, b) => a.y - b.y);
        }

        function drawLadder() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';

            const spacing = width / (count + 1);

            // Draw vertical lines
            for (let i = 0; i < count; i++) {
                const x = spacing * (i + 1);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }

            // Draw horizontal bars
            nodes.forEach(node => {
                const xStart = spacing * (node.column + 1);
                const xEnd = spacing * (node.column + 2);
                ctx.beginPath();
                ctx.moveTo(xStart, node.y);
                ctx.lineTo(xEnd, node.y);
                ctx.stroke();
            });
        }

        async function startLadder() {
            const spacing = width / (count + 1);
            const topInputs = document.querySelectorAll('#names-top .node-input');
            const bottomInputs = document.querySelectorAll('#names-bottom .node-input');
            
            let playerPaths = [];

            for (let i = 0; i < count; i++) {
                let currentXIdx = i;
                let pathPoints = [{x: spacing * (i + 1), y: 0}];
                
                // Sort nodes by Y to traverse downwards
                const sortedNodes = [...nodes].sort((a, b) => a.y - b.y);
                
                let currentY = 0;

                for (const node of sortedNodes) {
                    if (node.y <= currentY) continue;

                    // Move down to the bar
                    pathPoints.push({x: spacing * (currentXIdx + 1), y: node.y});
                    
                    // Move horizontally
                    if (node.column === currentXIdx) {
                        currentXIdx++; // Move right
                    } else if (node.column === currentXIdx - 1) {
                        currentXIdx--; // Move left
                    }
                    pathPoints.push({x: spacing * (currentXIdx + 1), y: node.y});
                    currentY = node.y;
                }

                pathPoints.push({x: spacing * (currentXIdx + 1), y: height});
                playerPaths.push({
                    startIdx: i,
                    endIdx: currentXIdx,
                    points: pathPoints,
                    name: topInputs[i].value,
                    result: bottomInputs[currentXIdx].value
                });
            }

            // Animation
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#007aff';

            for (const path of playerPaths) {
                await animatePath(path.points);
            }

            alert("사다리타기 완료!");
        }

        function animatePath(points) {
            return new Promise((resolve) => {
                let step = 0;
                function drawStep() {
                    if (step >= points.length - 1) {
                        resolve();
                        return;
                    }

                    const start = points[step];
                    const end = points[step + 1];

                    ctx.beginPath();
                    ctx.moveTo(start.x, start.y);
                    ctx.lineTo(end.x, end.y);
                    ctx.stroke();

                    step++;
                    requestAnimationFrame(drawStep);
                }
                drawStep();
            });
        }
    </script>
</body>
</html>
