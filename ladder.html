<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사다리타기</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-color: #000000;
            --accent-color: #007aff;
            --border-color: #c6c6c8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; }

        .setup-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label { font-weight: 600; min-width: 80px; }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.6; }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-reset { background-color: #ff3b30; color: white; margin-top: 10px; }

        #game-container {
            display: none;
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #fff;
        }

        .names-container, .results-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
        }

        .node-input {
            width: 60px;
            text-align: center;
            border: none;
            border-bottom: 2px solid var(--accent-color);
            font-size: 0.9rem;
            padding: 5px;
        }

        #result-display {
            margin-top: 20px;
            padding: 15px;
            background: #e5e5ea;
            border-radius: 10px;
            width: 100%;
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #d1d1d6;
        }

        .result-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <h1 id="title">🪜 사다리타기</h1>

    <div id="setup-ui" class="setup-container">
        <div class="input-row">
            <div class="input-group">
                <label>참가자 수</label>
                <input type="number" id="player-count" value="4" min="2" max="10">
            </div>
        </div>
        <button class="btn-primary" onclick="initGame()">사다리 생성</button>
    </div>

    <div id="game-container">
        <div id="names-top" class="names-container"></div>
        <canvas id="ladder-canvas"></canvas>
        <div id="names-bottom" class="results-container"></div>
        
        <button id="action-btn" class="btn-primary" style="margin-top: 20px;" onclick="startLadder()">결과 보기</button>
        <button class="btn-reset" onclick="location.reload()">다시 하기</button>

        <div id="result-display">
            <h3 style="margin-top:0; text-align:center;">🎊 결과 발표 🎊</h3>
            <div id="result-list"></div>
        </div>
    </div>

    <script>
        let count = 0;
        let width = 0;
        let height = 400;
        let nodes = []; 
        let playerPaths = [];

        const canvas = document.getElementById('ladder-canvas');
        const ctx = canvas.getContext('2d');

        function initGame() {
            count = parseInt(document.getElementById('player-count').value);
            if (count < 2 || count > 10) { alert("2~10명 사이로 입력해주세요."); return; }

            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            setupUI();
            drawLadder();
        }

        function setupUI() {
            const topDiv = document.getElementById('names-top');
            const bottomDiv = document.getElementById('names-bottom');
            topDiv.innerHTML = '';
            bottomDiv.innerHTML = '';

            width = Math.min(window.innerWidth - 60, 450);
            canvas.width = width;
            canvas.height = height;

            const spacing = width / (count + 1);

            for (let i = 0; i < count; i++) {
                const input = document.createElement('input');
                input.className = 'node-input';
                input.value = `P${i+1}`;
                input.style.width = `${spacing - 10}px`;
                topDiv.appendChild(input);

                const resInput = document.createElement('input');
                resInput.className = 'node-input';
                resInput.value = `R${i+1}`;
                resInput.style.width = `${spacing - 10}px`;
                bottomDiv.appendChild(resInput);
            }

            nodes = [];
            for (let i = 0; i < count - 1; i++) {
                let barCount = Math.floor(Math.random() * 3) + 2;
                for (let j = 0; j < barCount; j++) {
                    nodes.push({
                        column: i, 
                        y: Math.random() * (height - 60) + 30
                    });
                }
            }
            nodes.sort((a, b) => a.y - b.y);
        }

        function drawLadder() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';

            const spacing = width / (count + 1);

            for (let i = 0; i < count; i++) {
                const x = spacing * (i + 1);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }

            nodes.forEach(node => {
                const xStart = spacing * (node.column + 1);
                const xEnd = spacing * (node.column + 2);
                ctx.beginPath();
                ctx.moveTo(xStart, node.y);
                ctx.lineTo(xEnd, node.y);
                ctx.stroke();
            });
        }

        async function startLadder() {
            const actionBtn = document.getElementById('action-btn');
            actionBtn.disabled = true;
            actionBtn.style.opacity = 0.5;

            const spacing = width / (count + 1);
            const topInputs = document.querySelectorAll('#names-top .node-input');
            const bottomInputs = document.querySelectorAll('#names-bottom .node-input');
            
            playerPaths = [];

            for (let i = 0; i < count; i++) {
                let currentXIdx = i;
                let pathPoints = [{x: spacing * (i + 1), y: 0}];
                const sortedNodes = [...nodes].sort((a, b) => a.y - b.y);
                let currentY = 0;

                for (const node of sortedNodes) {
                    if (node.y <= currentY) continue;
                    pathPoints.push({x: spacing * (currentXIdx + 1), y: node.y});
                    if (node.column === currentXIdx) {
                        currentXIdx++; 
                    } else if (node.column === currentXIdx - 1) {
                        currentXIdx--; 
                    }
                    pathPoints.push({x: spacing * (currentXIdx + 1), y: node.y});
                    currentY = node.y;
                }
                pathPoints.push({x: spacing * (currentXIdx + 1), y: height});
                
                playerPaths.push({
                    name: topInputs[i].value,
                    result: bottomInputs[currentXIdx].value,
                    points: pathPoints
                });
            }

            ctx.lineWidth = 6;
            ctx.strokeStyle = '#007aff';

            for (const path of playerPaths) {
                await animatePath(path.points);
            }

            showResults();
        }

        function animatePath(points) {
            return new Promise((resolve) => {
                let step = 0;
                function drawStep() {
                    if (step >= points.length - 1) {
                        resolve();
                        return;
                    }
                    const start = points[step];
                    const end = points[step + 1];
                    ctx.beginPath();
                    ctx.moveTo(start.x, start.y);
                    ctx.lineTo(end.x, end.y);
                    ctx.stroke();
                    step++;
                    requestAnimationFrame(drawStep);
                }
                drawStep();
            });
        }

        function showResults() {
            const resultDisplay = document.getElementById('result-display');
            const resultList = document.getElementById('result-list');
            resultList.innerHTML = '';

            playerPaths.forEach(path => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `<span>${path.name}</span> <span>➔ ${path.result}</span>`;
                resultList.appendChild(item);
            });

            resultDisplay.style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
            
            // Scroll to results
            setTimeout(() => {
                resultDisplay.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>
</html>
