<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculator</title>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none;
        }
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; 
            touch-action: none;
        }
        .calculator { 
            width: 100%; 
            max-width: 400px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }
        #display { 
            flex: 1; 
            width: 100%; 
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            color: white; 
            font-size: clamp(4rem, 20vw, 6rem); 
            padding: 20px;
            overflow: hidden;
            word-break: break-all;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }
        button { 
            aspect-ratio: 1/1; 
            border-radius: 50%; 
            border: none; 
            font-size: 2rem; 
            color: white; 
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:active { background-color: #777; }
        .operator { background-color: #ff9f0a; }
        .special { background-color: #a5a5a5; color: black; }
        .zero { grid-column: span 2; aspect-ratio: auto; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display">0</div>
        <div class="grid">
            <button class="special" data-val="clear">AC</button>
            <button class="special" data-val="+/-">+/-</button>
            <button class="special" data-val="%">%</button>
            <button class="operator" data-val="/">÷</button>

            <button data-val="7">7</button>
            <button data-val="8">8</button>
            <button data-val="9">9</button>
            <button class="operator" data-val="*">×</button>

            <button data-val="4">4</button>
            <button data-val="5">5</button>
            <button data-val="6">6</button>
            <button class="operator" data-val="-">−</button>

            <button data-val="1">1</button>
            <button data-val="2">2</button>
            <button data-val="3">3</button>
            <button class="operator" data-val="+">+</button>

            <button class="zero" data-val="0">0</button>
            <button data-val=".">.</button>
            <button class="operator" data-val="=">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '0';

        document.addEventListener('touchstart', function(e) {
            const btn = e.target.closest('button');
            if (btn) {
                e.preventDefault();
                const val = btn.getAttribute('data-val');
                if (val) processInput(val);
            }
        }, { passive: false });

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (btn) {
                const val = btn.getAttribute('data-val');
                if (val) processInput(val);
            }
        });

        function processInput(val) {
            try {
                if (val === 'clear') {
                    currentInput = '0';
                } else if (val === '=') {
                    let expression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                    const result = new Function('return ' + expression)();
                    currentInput = String(Number.isInteger(result) ? result : parseFloat(result.toFixed(8)));
                } else if (val === '+/-') {
                    if (currentInput !== '0') currentInput = String(parseFloat(currentInput) * -1);
                } else if (val === '%') {
                    currentInput = String(parseFloat(currentInput) / 100);
                } else {
                    if (currentInput === '0' && val !== '.') currentInput = val;
                    else if (val === '.' && currentInput.includes('.')) return;
                    else currentInput += val;
                }
            } catch (err) {
                currentInput = 'Error';
            }
            display.innerText = currentInput;
        }
    </script>
</body>
</html>
